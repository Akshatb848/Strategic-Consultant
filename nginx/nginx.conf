worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Rate limiting — generous limits for a single-tenant tool
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    upstream frontend {
        server frontend:3000;
        keepalive 8;
    }

    upstream backend {
        server backend:8000;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options    "nosniff"           always;
        add_header X-Frame-Options           "SAMEORIGIN"        always;
        add_header X-XSS-Protection          "1; mode=block"     always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # Raise body size limit for report/PDF downloads
        client_max_body_size 10m;

        # Direct backend health/API surface for operational smoke checks.
        location /v1/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            limit_req zone=api burst=10 nodelay;
        }

        # SSE — disable buffering so events stream in real-time
        location /api/v1/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Required for SSE streaming
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            limit_req zone=api burst=10 nodelay;
        }

        # Auth endpoints — tighter rate limit
        location /api/v1/auth/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_buffering    off;

            limit_req zone=auth burst=5 nodelay;
        }

        # All other traffic — Next.js app
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
        }
    }
}
