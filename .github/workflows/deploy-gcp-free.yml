name: Deploy GCP Free Tier

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deploy at a time. A newer push cancels any in-progress run so the
# VM always ends up at the latest commit and concurrent runs can't race to
# delete each other's Docker images on the VM.
concurrency:
  group: deploy-gcp-free-vm
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REPOSITORY: ${{ github.repository }}
      VM_HOST: ${{ vars.GCP_FREE_VM_HOST || secrets.GCP_FREE_VM_HOST }}
      VM_USER: ${{ vars.GCP_FREE_VM_USER || secrets.GCP_FREE_VM_USER }}
      VM_DATA_DIR: /opt/asis/data
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image names
        id: names
        shell: bash
        run: |
          echo "backend_image=asis-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=asis-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: asis/backend/Dockerfile
          load: true
          tags: ${{ steps.names.outputs.backend_image }}
          cache-from: type=gha,scope=asis-backend
          cache-to: type=gha,mode=max,scope=asis-backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: asis/frontend/Dockerfile
          load: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ env.VM_HOST }}
          tags: ${{ steps.names.outputs.frontend_image }}
          cache-from: type=gha,scope=asis-frontend
          cache-to: type=gha,mode=max,scope=asis-frontend

      - name: Deploy to GCP VM
        shell: bash
        env:
          BACKEND_IMAGE: ${{ steps.names.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.names.outputs.frontend_image }}
          VM_HOST: ${{ env.VM_HOST }}
          VM_USER: ${{ env.VM_USER }}
          VM_DATA_DIR: ${{ env.VM_DATA_DIR }}
          JWT_SECRET: ${{ secrets.GCP_FREE_JWT_SECRET }}
          REPOSITORY: ${{ github.repository }}
          SSH_PRIVATE_KEY: ${{ secrets.GCP_FREE_VM_SSH_KEY }}
          GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID || secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ vars.GOOGLE_CALLBACK_URL || secrets.GOOGLE_CALLBACK_URL }}
          GITHUB_CLIENT_ID: ${{ vars.GITHUB_CLIENT_ID || secrets.GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          GITHUB_CALLBACK_URL: ${{ vars.GITHUB_CALLBACK_URL || secrets.GITHUB_CALLBACK_URL }}
          LITELLM_PROXY_URL: ${{ vars.LITELLM_PROXY_URL || secrets.LITELLM_PROXY_URL }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_BASE: ${{ vars.GROQ_API_BASE || secrets.GROQ_API_BASE }}
          GROQ_MODEL_PRIMARY: ${{ vars.GROQ_MODEL_PRIMARY || secrets.GROQ_MODEL_PRIMARY }}
          GROQ_MODEL_FAST: ${{ vars.GROQ_MODEL_FAST || secrets.GROQ_MODEL_FAST }}
          GROQ_MODEL_REASONING: ${{ vars.GROQ_MODEL_REASONING || secrets.GROQ_MODEL_REASONING }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPEN_MODEL_API_BASE: ${{ vars.OPEN_MODEL_API_BASE || secrets.OPEN_MODEL_API_BASE }}
          OPEN_MODEL_API_KEY: ${{ secrets.OPEN_MODEL_API_KEY }}
        run: |
          set -euo pipefail
          trap 'echo "::error::Deploy runner failed at line ${LINENO}: ${BASH_COMMAND}"' ERR

          install -m 700 -d ~/.ssh
          key_file=~/.ssh/gcp_free_vm_key
          key_valid=false

          # Try the secret exactly as provided, normalizing Windows line endings.
          printf '%s' "${SSH_PRIVATE_KEY}" | tr -d '\r' > "${key_file}"
          chmod 600 "${key_file}"
          if ssh-keygen -y -f "${key_file}" >/dev/null 2>&1; then
            key_valid=true
          fi

          # Try common GitHub secret formatting where newlines were pasted as literal \n.
          if [[ "${key_valid}" != "true" ]]; then
            printf '%s' "${SSH_PRIVATE_KEY}" | perl -0pe 's/\r//g; s/\\n/\n/g' > "${key_file}"
            chmod 600 "${key_file}"
            if ssh-keygen -y -f "${key_file}" >/dev/null 2>&1; then
              key_valid=true
            fi
          fi

          # Try base64-encoded private keys as a final fallback.
          if [[ "${key_valid}" != "true" ]]; then
            if printf '%s' "${SSH_PRIVATE_KEY}" | tr -d '\r\n\t ' | base64 -d > "${key_file}" 2>/dev/null; then
              chmod 600 "${key_file}"
              if ssh-keygen -y -f "${key_file}" >/dev/null 2>&1; then
                key_valid=true
              fi
            fi
          fi

          if [[ "${key_valid}" != "true" ]]; then
            echo "::error::GCP_FREE_VM_SSH_KEY is not a valid private key. The workflow accepts raw multiline keys, keys pasted with literal \\n, and base64-encoded private keys."
            exit 1
          fi

          ssh_opts=(
            -i ~/.ssh/gcp_free_vm_key
            -o BatchMode=yes
            -o ConnectTimeout=15
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=~/.ssh/known_hosts
          )
          ssh-keyscan -H "${VM_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          remote_env=(
            "BACKEND_IMAGE=${BACKEND_IMAGE}"
            "FRONTEND_IMAGE=${FRONTEND_IMAGE}"
            "VM_HOST=${VM_HOST}"
            "VM_DATA_DIR=${VM_DATA_DIR}"
            "JWT_SECRET=${JWT_SECRET}"
            "REPOSITORY=${REPOSITORY}"
            "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}"
            "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}"
            "GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}"
            "GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}"
            "GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}"
            "GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-}"
            "LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-}"
            "LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}"
            "GROQ_API_KEY=${GROQ_API_KEY:-}"
            "GROQ_API_BASE=${GROQ_API_BASE:-}"
            "GROQ_MODEL_PRIMARY=${GROQ_MODEL_PRIMARY:-}"
            "GROQ_MODEL_FAST=${GROQ_MODEL_FAST:-}"
            "GROQ_MODEL_REASONING=${GROQ_MODEL_REASONING:-}"
            "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}"
            "OPENAI_API_KEY=${OPENAI_API_KEY:-}"
            "OPEN_MODEL_API_BASE=${OPEN_MODEL_API_BASE:-}"
            "OPEN_MODEL_API_KEY=${OPEN_MODEL_API_KEY:-}"
          )

          run_remote() {
            ssh "${ssh_opts[@]}" "${VM_USER}@${VM_HOST}" \
              "$(printf '%q ' env "${remote_env[@]}" /bin/bash -se)"
          }

          collect_remote_diagnostics() {
            run_remote <<'SCRIPT'
          set +e
          set +u
          set +o pipefail

          if sudo -n true >/dev/null 2>&1; then
            SUDO="sudo"
            DEPLOY_ROOT="/opt/asis"
          else
            SUDO=""
            DEPLOY_ROOT="${HOME}/.asis"
          fi

          APP_DIR="${DEPLOY_ROOT}/app"

          docker_cmd() {
            if [[ -n "${SUDO}" ]]; then
              sudo docker "$@"
            else
              docker "$@"
            fi
          }

          echo "[remote-diagnostics] Timestamp: $(date -Is)"
          echo "[remote-diagnostics] Disk usage:"
          df -h || true
          echo "[remote-diagnostics] Memory usage:"
          free -m || true

          if command -v docker >/dev/null 2>&1; then
            echo "[remote-diagnostics] Docker system df:"
            docker_cmd system df || true
            echo "[remote-diagnostics] Docker containers:"
            docker_cmd ps -a || true
            echo "[remote-diagnostics] Docker images:"
            docker_cmd image ls || true

            if [[ -f "${APP_DIR}/docker-compose.gcp-free.yml" && -f "${APP_DIR}/.env.gcp" ]]; then
              echo "[remote-diagnostics] Compose service status:"
              docker_cmd compose -f "${APP_DIR}/docker-compose.gcp-free.yml" --env-file "${APP_DIR}/.env.gcp" ps || true
            fi

            for container_name in asis-gcp-free-backend-1 asis-gcp-free-frontend-1 asis-gcp-free-nginx-1; do
              if docker_cmd inspect "${container_name}" >/dev/null 2>&1; then
                echo "[remote-diagnostics] Inspect ${container_name}:"
                docker_cmd inspect "${container_name}" || true
                echo "[remote-diagnostics] Logs ${container_name}:"
                docker_cmd logs "${container_name}" --tail 250 || true
              fi
            done
          fi
          SCRIPT
          }

          echo "Running preflight cleanup on ${VM_USER}@${VM_HOST} before streaming images."
          run_remote <<'SCRIPT'
          set -euo pipefail
          trap 'echo "[remote-preflight] Failed at line ${LINENO}: ${BASH_COMMAND}" >&2' ERR

          if sudo -n true >/dev/null 2>&1; then
            SUDO="sudo"
            DEPLOY_ROOT="/opt/asis"
          else
            SUDO=""
            DEPLOY_ROOT="${HOME}/.asis"
          fi

          docker_cmd() {
            if [[ -n "${SUDO}" ]]; then
              sudo docker "$@"
            else
              docker "$@"
            fi
          }

          if [[ -n "${SUDO}" ]]; then
            sudo install -d -m 0755 -o "${USER}" -g "${USER}" "${DEPLOY_ROOT}"
          else
            mkdir -p "${DEPLOY_ROOT}"
          fi

          if command -v docker >/dev/null 2>&1; then
            echo "[remote-preflight] Disk usage before cleanup:"
            df -h || true
            echo "[remote-preflight] Docker usage before cleanup:"
            docker_cmd system df || true

            while IFS= read -r match; do
              [[ -z "${match}" ]] && continue

              container_id="$(awk '{print $1}' <<<"${match}")"
              container_name="$(awk '{print $2}' <<<"${match}")"
              compose_project="$(awk '{print $3}' <<<"${match}")"

              if [[ "${compose_project}" == "strategic-decision-maker" || "${container_name}" == strategic-decision-maker-* ]]; then
                echo "[remote-preflight] Removing legacy strategic-decision-maker container ${container_name}"
                docker_cmd rm -f "${container_id}" >/dev/null 2>&1 || true
              fi
            done < <(docker_cmd ps -a --format '{{.ID}} {{.Names}} {{.Label "com.docker.compose.project"}}')

            while IFS= read -r image_ref; do
              [[ -z "${image_ref}" ]] && continue
              if [[ "${image_ref}" == "${BACKEND_IMAGE}" || "${image_ref}" == "${FRONTEND_IMAGE}" ]]; then
                continue
              fi
              echo "[remote-preflight] Removing stale deployment image ${image_ref}"
              docker_cmd image rm -f "${image_ref}" >/dev/null 2>&1 || true
            done < <(docker_cmd image ls --format '{{.Repository}}:{{.Tag}}' | grep -E '^(asis-(backend|frontend):|ghcr\.io/akshatb848/strategic-decision-maker/(backend|frontend):)' || true)

            docker_cmd image prune -f >/dev/null 2>&1 || true
            docker_cmd container prune -f >/dev/null 2>&1 || true
            echo "[remote-preflight] Docker usage after cleanup:"
            docker_cmd system df || true
          fi
          SCRIPT

          # Transfer runner-built images directly to the VM so deploys do not depend on GHCR pull access.
          echo "Streaming prebuilt Docker images to ${VM_USER}@${VM_HOST}."
          docker save "${BACKEND_IMAGE}" | gzip | ssh "${ssh_opts[@]}" "${VM_USER}@${VM_HOST}" 'if sudo -n true >/dev/null 2>&1; then gunzip | sudo docker load; else gunzip | docker load; fi'
          docker save "${FRONTEND_IMAGE}" | gzip | ssh "${ssh_opts[@]}" "${VM_USER}@${VM_HOST}" 'if sudo -n true >/dev/null 2>&1; then gunzip | sudo docker load; else gunzip | docker load; fi'

          run_remote <<'SCRIPT'
          set -euo pipefail
          trap 'echo "[remote-load] Failed at line ${LINENO}: ${BASH_COMMAND}" >&2' ERR

          if sudo -n true >/dev/null 2>&1; then
            SUDO="sudo"
          else
            SUDO=""
          fi

          docker_cmd() {
            if [[ -n "${SUDO}" ]]; then
              sudo docker "$@"
            else
              docker "$@"
            fi
          }

          docker_cmd image inspect "${BACKEND_IMAGE}" >/dev/null
          docker_cmd image inspect "${FRONTEND_IMAGE}" >/dev/null
          echo "[remote-load] Verified streamed images in the active Docker context."
          SCRIPT

          if ! run_remote <<'SCRIPT'
          set -euo pipefail
          trap 'echo "[remote-deploy] Failed at line ${LINENO}: ${BASH_COMMAND}" >&2' ERR

          if sudo -n true >/dev/null 2>&1; then
            SUDO="sudo"
            DEPLOY_ROOT="/opt/asis"
            RESOLVED_VM_DATA_DIR="${VM_DATA_DIR:-/opt/asis/data}"
          else
            SUDO=""
            DEPLOY_ROOT="${HOME}/.asis"
            RESOLVED_VM_DATA_DIR="${HOME}/.asis/data"
          fi

          APP_DIR="${DEPLOY_ROOT}/app"

          apt_lock_holders() {
            pgrep -af '(apt|apt-get|dpkg|unattended-upgr|unattended-upgrade)' 2>/dev/null || true
          }

          wait_for_package_manager() {
            local timeout_seconds="${1:-600}"
            local poll_interval="${2:-10}"
            local elapsed_seconds=0
            local holders

            while true; do
              holders="$(apt_lock_holders)"
              if [[ -z "${holders}" ]]; then
                return 0
              fi

              if (( elapsed_seconds >= timeout_seconds )); then
                echo "[remote-deploy] Timed out waiting for apt/dpkg lock holders after ${timeout_seconds}s." >&2
                echo "${holders}" >&2
                return 1
              fi

              echo "[remote-deploy] Waiting for apt/dpkg lock holders (${elapsed_seconds}s/${timeout_seconds}s)." >&2
              echo "${holders}" >&2
              sleep "${poll_interval}"
              elapsed_seconds=$((elapsed_seconds + poll_interval))
            done
          }

          apt_get_with_retry() {
            local max_attempts=12
            local attempt=1
            local sleep_seconds=10
            local output_file
            output_file="$(mktemp)"

            while (( attempt <= max_attempts )); do
              wait_for_package_manager 600 "${sleep_seconds}"

              if sudo apt-get "$@" 2>&1 | tee "${output_file}"; then
                rm -f "${output_file}"
                return 0
              fi

              if grep -Eq 'Could not get lock|Unable to acquire the dpkg frontend lock|Could not open lock file' "${output_file}"; then
                echo "[remote-deploy] apt-get $* was blocked by a package-manager lock (attempt ${attempt}/${max_attempts}). Retrying after ${sleep_seconds}s." >&2
                sleep "${sleep_seconds}"
                attempt=$((attempt + 1))
                continue
              fi

              rm -f "${output_file}"
              return 1
            done

            rm -f "${output_file}"
            return 1
          }

          if [[ -n "${SUDO}" ]]; then
            sudo install -d -m 0755 -o "${USER}" -g "${USER}" "${DEPLOY_ROOT}"
          fi

          if ! command -v git >/dev/null 2>&1; then
            if [[ -n "${SUDO}" ]]; then
              apt_get_with_retry update
              DEBIAN_FRONTEND=noninteractive apt_get_with_retry install -y git
            else
              echo "git is required on the VM and passwordless sudo is not available to install it automatically."
              exit 1
            fi
          fi

          if [ ! -d "${APP_DIR}/.git" ]; then
            mkdir -p "${DEPLOY_ROOT}"
            git clone "https://github.com/${REPOSITORY}.git" "${APP_DIR}"
          elif [[ -n "${SUDO}" ]]; then
            sudo chown -R "${USER}:${USER}" "${APP_DIR}"
          fi

          cd "${APP_DIR}"
          git fetch origin
          if git show-ref --verify --quiet refs/heads/main; then
            git checkout main
          else
            git checkout -b main origin/main
          fi
          # This checkout is automation-owned, so keep it force-synced to origin/main.
          git reset --hard origin/main
          git clean -fd

          cat > .env.gcp <<EOF
          JWT_SECRET=${JWT_SECRET}
          FRONTEND_URL=http://${VM_HOST}
          FRONTEND_INTERNAL_URL=http://frontend:3000
          ALLOWED_ORIGINS=http://${VM_HOST}
          NEXT_PUBLIC_API_URL=http://${VM_HOST}
          DATABASE_URL=sqlite:////data/asis_v4.db
          ASIS_DATA_DIR=${RESOLVED_VM_DATA_DIR}
          ENVIRONMENT=production
          ASIS_DEMO_MODE=false
          ALLOW_LLM_FALLBACK=false
          RUN_ANALYSES_INLINE=false
          ENABLE_AUTO_SCHEMA=true
          SECURE_COOKIES=false
          LOCAL_WORKER_CONCURRENCY=1
          REDIS_URL=memory://
          CELERY_BROKER_URL=memory://
          CELERY_RESULT_BACKEND=memory://
          LANGFUSE_ENABLED=false
          COST_TRACKING_ENABLED=false
          LITELLM_PROXY_URL=${LITELLM_PROXY_URL:-}
          LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
          GROQ_API_KEY=${GROQ_API_KEY:-}
          GROQ_API_BASE=${GROQ_API_BASE:-https://api.groq.com/openai/v1}
          GROQ_MODEL_PRIMARY=${GROQ_MODEL_PRIMARY:-llama-3.3-70b-versatile}
          GROQ_MODEL_FAST=${GROQ_MODEL_FAST:-llama-3.1-8b-instant}
          GROQ_MODEL_REASONING=${GROQ_MODEL_REASONING:-llama-3.3-70b-versatile}
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
          ANTHROPIC_MAX_TOKENS=4096
          OPENAI_API_KEY=${OPENAI_API_KEY:-}
          OPEN_MODEL_API_BASE=${OPEN_MODEL_API_BASE:-}
          OPEN_MODEL_API_KEY=${OPEN_MODEL_API_KEY:-}
          BACKEND_PORT=8000
          FRONTEND_PORT=3000
          BACKEND_IMAGE=${BACKEND_IMAGE}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
          GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://${VM_HOST}:8000/api/v1/auth/google/callback}
          GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
          GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
          GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-http://${VM_HOST}:8000/api/v1/auth/github/callback}
          EOF

          for required_key in JWT_SECRET FRONTEND_URL ALLOWED_ORIGINS NEXT_PUBLIC_API_URL BACKEND_IMAGE FRONTEND_IMAGE; do
            grep -q "^${required_key}=" .env.gcp || {
              echo "[remote-deploy] Missing ${required_key} in generated .env.gcp" >&2
              exit 1
            }
          done

          bash scripts/gcp-free-bootstrap.sh
          SCRIPT
          then
            echo "::group::Remote diagnostics"
            collect_remote_diagnostics || true
            echo "::endgroup::"
            echo "::error::Remote deploy failed. Review the [remote-deploy] lines above for 