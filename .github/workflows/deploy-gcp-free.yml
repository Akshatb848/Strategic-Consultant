name: Deploy GCP Free Tier

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      REPOSITORY: ${{ github.repository }}
      VM_HOST: ${{ secrets.GCP_FREE_VM_HOST }}
      VM_USER: ${{ secrets.GCP_FREE_VM_USER }}
      VM_DATA_DIR: /opt/asis/data
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image names
        id: names
        shell: bash
        run: |
          repo_lc="$(echo "${REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          owner_lc="${repo_lc%%/*}"
          repo_name_lc="${repo_lc##*/}"
          echo "repo_lc=${repo_lc}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${REGISTRY}/${owner_lc}/${repo_name_lc}-backend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${REGISTRY}/${owner_lc}/${repo_name_lc}-frontend:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: asis/backend/Dockerfile
          push: true
          tags: ${{ steps.names.outputs.backend_image }}
          cache-from: type=gha,scope=asis-backend
          cache-to: type=gha,mode=max,scope=asis-backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: asis/frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ env.VM_HOST }}:8000
          tags: ${{ steps.names.outputs.frontend_image }}
          cache-from: type=gha,scope=asis-frontend
          cache-to: type=gha,mode=max,scope=asis-frontend

      - name: Deploy to GCP VM
        shell: bash
        env:
          BACKEND_IMAGE: ${{ steps.names.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ steps.names.outputs.frontend_image }}
          VM_HOST: ${{ env.VM_HOST }}
          VM_USER: ${{ secrets.GCP_FREE_VM_USER }}
          VM_DATA_DIR: ${{ env.VM_DATA_DIR }}
          JWT_SECRET: ${{ secrets.GCP_FREE_JWT_SECRET }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_READ_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SSH_PRIVATE_KEY: ${{ secrets.GCP_FREE_VM_SSH_KEY }}
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s' "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/gcp_free_vm_key
          chmod 600 ~/.ssh/gcp_free_vm_key
          if ! ssh-keygen -y -f ~/.ssh/gcp_free_vm_key >/dev/null 2>&1; then
            echo "::error::GCP_FREE_VM_SSH_KEY is not a valid private key. Paste the exact private key block from ~/.ssh/github_actions_deploy into the GitHub secret."
            exit 1
          fi
          ssh-keyscan -H "${VM_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

          remote_env=(
            "BACKEND_IMAGE=${BACKEND_IMAGE}"
            "FRONTEND_IMAGE=${FRONTEND_IMAGE}"
            "VM_HOST=${VM_HOST}"
            "VM_DATA_DIR=${VM_DATA_DIR}"
            "JWT_SECRET=${JWT_SECRET}"
            "GHCR_USERNAME=${GHCR_USERNAME}"
            "GHCR_READ_TOKEN=${GHCR_READ_TOKEN}"
            "REPOSITORY=${REPOSITORY}"
          )

          if ! ssh -i ~/.ssh/gcp_free_vm_key -o BatchMode=yes -o ConnectTimeout=15 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts "${VM_USER}@${VM_HOST}" \
            "$(printf '%q ' env "${remote_env[@]}" /bin/bash -se)" <<'SCRIPT'
          set -euo pipefail

          if ! command -v git >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y git
          fi

          if [ ! -d /opt/asis/app/.git ]; then
            sudo mkdir -p /opt/asis
            sudo chown "$USER":"$USER" /opt/asis
            git clone "https://github.com/${REPOSITORY}.git" /opt/asis/app
          fi

          sudo chown -R "$USER":"$USER" /opt/asis/app

          cd /opt/asis/app
          git fetch origin
          git checkout main
          git pull --ff-only origin main

          cat > .env.gcp <<EOF
          JWT_SECRET=${JWT_SECRET}
          FRONTEND_URL=http://${VM_HOST}:3001
          ALLOWED_ORIGINS=http://${VM_HOST}:3001
          NEXT_PUBLIC_API_URL=http://${VM_HOST}:8000
          DATABASE_URL=sqlite:////data/asis_v4.db
          ASIS_DATA_DIR=${VM_DATA_DIR}
          ENVIRONMENT=production
          ASIS_DEMO_MODE=true
          RUN_ANALYSES_INLINE=true
          ENABLE_AUTO_SCHEMA=true
          SECURE_COOKIES=false
          LOCAL_WORKER_CONCURRENCY=1
          BACKEND_PORT=8000
          FRONTEND_PORT=3001
          BACKEND_IMAGE=${BACKEND_IMAGE}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          EOF

          chmod +x scripts/gcp-free-bootstrap.sh
          export GHCR_USERNAME GHCR_READ_TOKEN
          ./scripts/gcp-free-bootstrap.sh
          sudo docker compose -f docker-compose.gcp-free.yml --env-file .env.gcp ps
          SCRIPT
          then
            echo "::error::SSH deploy failed. Verify GCP_FREE_VM_USER matches the VM login user and that ~/.ssh/authorized_keys contains the public key paired with GCP_FREE_VM_SSH_KEY."
            exit 1
          fi
