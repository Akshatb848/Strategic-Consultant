name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asis/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest tests -q

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asis/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: asis/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Type-check frontend
        run: npm run type-check

