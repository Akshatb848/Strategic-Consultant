name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "claude/**"

jobs:
  # ── Backend: lint + type-check + unit tests ───────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asis/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: asis/backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install slowapi langfuse

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test_asis.db
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          JWT_SECRET: test-secret-32-chars-minimum-len!!
          ENVIRONMENT: test
          ASIS_DEMO_MODE: "true"
          LANGFUSE_ENABLED: "false"
          COST_TRACKING_ENABLED: "false"
        run: pytest tests -q --tb=short

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: asis/backend/.coverage
          if-no-files-found: ignore

  # ── Frontend: type-check + component tests ────────────────────────────────
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asis/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: asis/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run type-check

      - name: Run component tests
        run: npm run test:ci

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: asis/frontend/coverage
          if-no-files-found: ignore

  # ── Security: dependency vulnerability scan ───────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: asis/backend
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-48 || true
        # `|| true` prevents blocking on low-severity advisories;
        # review the output and remove once addressed

      - name: Audit npm dependencies
        working-directory: asis/frontend
        run: npm audit --audit-level=high || true

  # ── Migration check: verify Alembic heads are consistent ─────────────────
  migration-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: asis/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: asis/backend/requirements.txt

      - name: Install backend dependencies
        run: |
          pip install -r requirements.txt

      - name: Check migration heads
        env:
          DATABASE_URL: sqlite:///./test_migration.db
        run: |
          alembic -c alembic.ini heads 2>&1
          alembic -c alembic.ini check 2>&1 || echo "Pending migrations detected — run alembic upgrade head"
