version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: asis/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3000"
    env_file:
      - .env
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: asis/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://asis:asis@postgres:5432/asis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      LITELLM_PROXY_URL: http://litellm:4000
      LANGFUSE_HOST: http://langfuse:3000
      FRONTEND_URL: http://localhost:3001
      ALLOWED_ORIGINS: http://localhost:3001
    depends_on:
      - postgres
      - redis
      - qdrant
      - litellm

  celery-worker:
    build:
      context: .
      dockerfile: asis/backend/Dockerfile
    command: celery -A asis.backend.tasks.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://asis:asis@postgres:5432/asis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      LITELLM_PROXY_URL: http://litellm:4000
    depends_on:
      - backend
      - redis

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - .env
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    ports:
      - "4000:4000"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: asis
      POSTGRES_USER: asis
      POSTGRES_PASSWORD: asis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  n8n:
    build:
      context: .
      dockerfile: asis/n8n/Dockerfile
    env_file:
      - .env
    ports:
      - "5678:5678"
    depends_on:
      - backend

  langfuse:
    image: ghcr.io/langfuse/langfuse:2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://asis:asis@postgres:5432/asis
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: ${JWT_SECRET}
      SALT: ${JWT_SECRET}
      TELEMETRY_ENABLED: "false"
    ports:
      - "3002:3000"
    depends_on:
      - postgres

volumes:
  postgres-data:
  qdrant-data:

