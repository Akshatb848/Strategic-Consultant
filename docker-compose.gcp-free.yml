name: asis-gcp-free

services:
  backend:
    image: ${BACKEND_IMAGE:-asis-backend:gcp-free}
    build:
      context: .
      dockerfile: asis/backend/Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/asis_v4.db}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.gcp}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL in .env.gcp}
      FRONTEND_INTERNAL_URL: ${FRONTEND_INTERNAL_URL:-http://frontend:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS in .env.gcp}
      ASIS_DEMO_MODE: ${ASIS_DEMO_MODE:-false}
      ALLOW_LLM_FALLBACK: ${ALLOW_LLM_FALLBACK:-false}
      RUN_ANALYSES_INLINE: ${RUN_ANALYSES_INLINE:-true}
      ENABLE_AUTO_SCHEMA: ${ENABLE_AUTO_SCHEMA:-true}
      SECURE_COOKIES: ${SECURE_COOKIES:-false}
      LOCAL_WORKER_CONCURRENCY: ${LOCAL_WORKER_CONCURRENCY:-1}
      REDIS_URL: ${REDIS_URL:-memory://}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-memory://}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-memory://}
      LITELLM_PROXY_URL: ${LITELLM_PROXY_URL:-}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_BASE: ${GROQ_API_BASE:-https://api.groq.com/openai/v1}
      GROQ_MODEL_PRIMARY: ${GROQ_MODEL_PRIMARY:-llama-3.3-70b-versatile}
      GROQ_MODEL_FAST: ${GROQ_MODEL_FAST:-llama-3.1-8b-instant}
      GROQ_MODEL_REASONING: ${GROQ_MODEL_REASONING:-llama-3.3-70b-versatile}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPEN_MODEL_API_BASE: ${OPEN_MODEL_API_BASE:-}
      OPEN_MODEL_API_KEY: ${OPEN_MODEL_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
      COST_TRACKING_ENABLED: ${COST_TRACKING_ENABLED:-false}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
    volumes:
      - type: bind
        source: ${ASIS_DATA_DIR:-/opt/asis/data}
        target: /data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:8000/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 40s

  frontend:
    image: ${FRONTEND_IMAGE:-asis-frontend:gcp-free}
    build:
      context: .
      dockerfile: asis/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env.gcp}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env.gcp}
      BACKEND_INTERNAL_URL: http://backend:8000
      PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH:-/usr/bin/chromium}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - type: bind
        source: ./nginx/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
    depends_on:
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
