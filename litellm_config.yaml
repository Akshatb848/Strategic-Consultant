model_list:
  - model_name: claude-sonnet-4-5
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-3-5-haiku-20241022
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: vertex_ai/gemini-2.5-pro

  - model_name: gemini-2.0-flash
    litellm_params:
      model: vertex_ai/gemini-2.0-flash

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY

  - model_name: qwen-strategy
    litellm_params:
      model: openai/qwen/qwen3-32b
      api_base: os.environ/OPEN_MODEL_API_BASE
      api_key: os.environ/OPEN_MODEL_API_KEY

  - model_name: phi-4-reasoning
    litellm_params:
      model: openai/microsoft/phi-4
      api_base: os.environ/OPEN_MODEL_API_BASE
      api_key: os.environ/OPEN_MODEL_API_KEY

  - model_name: arctic-research
    litellm_params:
      model: openai/snowflake/arctic-instruct
      api_base: os.environ/OPEN_MODEL_API_BASE
      api_key: os.environ/OPEN_MODEL_API_KEY

  - model_name: llama-governance
    litellm_params:
      model: openai/meta-llama/llama-3.3-70b-instruct
      api_base: os.environ/OPEN_MODEL_API_BASE
      api_key: os.environ/OPEN_MODEL_API_KEY

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  set_verbose: false
