steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - asis/frontend/Dockerfile
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_PUBLIC_API_URL}
      - -t
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_FRONTEND_IMAGE}:${SHORT_SHA}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_FRONTEND_IMAGE}:${SHORT_SHA}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image
      - ${_AR_HOSTNAME}/${PROJECT_ID}/${_AR_REPOSITORY}/${_FRONTEND_IMAGE}:${SHORT_SHA}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "3000"

substitutions:
  _AR_HOSTNAME: us-central1-docker.pkg.dev
  _AR_REPOSITORY: asis
  _FRONTEND_IMAGE: asis-frontend
  _FRONTEND_SERVICE: asis-frontend
  _PUBLIC_API_URL: https://backend.example.com
  _REGION: us-central1

